name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) when a GitHub Release is
# published. No API token is needed: configure a Trusted Publisher for this
# repo + workflow on https://pypi.org first (see README / runbook).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Verify version matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(ls dist/*.tar.gz | sed -E 's/.*chefiq_ble-([0-9.]+)\.tar\.gz/\1/')
          echo "tag=$tag package=$pkg"
          test "$tag" = "$pkg"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
